name: Terraform Docs

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - iac/**/*.tf
      - iac/**/*.tfvars
      - iac/**/*.tftpl
      - iac/**/*.hcl

# Disable permissions for all available scopes
permissions: {}

jobs:
  terraform-docs:
    if: ${{ github.event.pull_request.merged == true }}
    name: Terraform Docs
    uses: 3ware/workflows/.github/workflows/terraform-docs.yaml@f74bf1b565be2454d84c575e601c479c6efaa8d2 # v4.17.0
    secrets: inherit
    with:
      tf-directory: iac
